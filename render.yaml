# Render Blueprint — one public URL for Web Messenger + API + Mobile clients
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy:
#   1. Set ENCRYPTION_KEY (64 hex chars): openssl rand -hex 32
#   2. Set APP_URL to your service URL, e.g. https://mobile-messenger.onrender.com
#   3. Configure SMTP (Resend, SendGrid, Gmail, etc.) — see RENDER.md
#   4. Run scripts/prepare-render-deploy.ps1 locally, commit backend/public, push

databases:
  - name: mobile-messenger-db
    plan: free
    databaseName: messenger
    user: messenger

services:
  - type: web
    name: mobile-messenger
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mobile-messenger-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_REQUIRE_TLS
        value: "true"
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
