name: mobile
description: Mobile Messenger - Flutter messaging app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  socket_io_client: ^3.0.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  video_player: ^2.9.2
  record: ^6.1.0
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1
  intl: ^0.20.1
  connectivity_plus: ^6.1.1
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  mime: ^2.0.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  http_parser: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
